<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>所要時間編集ページ</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #111;
      color: #eee;
      padding: 2em;
    }
    h1 {
      color: #ff6666;
      font-size: 1.8em;
      margin-bottom: 1em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1em;
    }
    th, td {
      padding: 0.5em;
      border: 1px solid #555;
      text-align: center;
    }
    th {
      background-color: #222;
    }
    input[type="number"] {
      width: 60px;
      padding: 0.3em;
      background-color: #222;
      color: #fff;
      border: 1px solid #444;
    }
    button {
      padding: 0.4em 1em;
      background-color: crimson;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: darkred;
    }
    #message {
      margin-top: 1em;
      font-size: 1em;
      color: lightgreen;
    }
    #next-estimate {
      margin-top: 1em;
      font-size: 1.1em;
      color: lightblue;
    }
  </style>
</head>
<body>

  <h1>整理券ごとの所要時間を編集</h1>
  <div id="timer-panel" style="margin-bottom:20px;">
  <h2>呼び出し番号時間計測</h2>

  <div id="current-ticket" style="font-size:1.2em;margin-bottom:10px;">
    現在計測中: -
  </div>

  <div id="elapsed-time" style="font-size:1.5em;color:gold;margin-bottom:10px;">
    00:00
  </div>

  <button onclick="startMeasurement()">
    開始
  </button>

  <button onclick="finishMeasurement()">
    完了
  </button>
</div>
  <div id="message"></div>
  <div id="next-estimate"></div>
  <table id="time-table">
    <thead>
      <tr>
        <th>整理券番号</th>
        <th>所要時間（分）</th>
        <th>手動編集</th>
      </tr>
    </thead>
    <tbody>
      <!-- JSで埋め込み -->
    </tbody>
  </table>

  <script>
let timerInterval = null;
let timerStartTime = null;
let measuringTicket = null;
    async function loadTimeData() {
      try {
        const res = await fetch("/api/time-data");
        const data = await res.json();
        const tbody = document.querySelector("#time-table tbody");
        tbody.innerHTML = "";

        data.sort((a, b) => a.number - b.number).forEach(entry => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${entry.number}</td>
            <td><input type="number" id="time-${entry.number}" value="${entry.actualMinutes ?? 4}" min="0" /></td>
            <td><button onclick="updateTime(${entry.number})">更新</button></td>
          `;
          tbody.appendChild(tr);
        });

        // 入場目安表示の追加処理
        const start = new Date();
        start.setHours(9, 30, 0, 0); // 9:30スタート
        let total = 0;
        data.forEach(entry => {
          const minutes = entry?.actualMinutes ?? 4;
          total += minutes;
        });

        const estimate = new Date(start.getTime() + total * 60000);
        const h = estimate.getHours().toString().padStart(2, '0');
        const m = estimate.getMinutes().toString().padStart(2, '0');
        document.getElementById("next-estimate").textContent =
          `次の整理券（${data.length + 1}番）の入場目安は ${h}:${m} 頃です。`;

      } catch (e) {
        document.getElementById("message").textContent = "データの読み込みに失敗しました。";
      }
    }

    async function updateTime(number) {
      const minutes = parseInt(document.getElementById(`time-${number}`).value);
      if (isNaN(minutes) || minutes < 0) {
        alert("正しい所要時間を入力してください。");
        return;
      }

      try {
        const res = await fetch("/api/time-data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ number, actualMinutes: minutes }),
        });
        const data = await res.json();
        document.getElementById("message").textContent = data.message || "更新しました。";
        loadTimeData(); // 更新後に再表示（目安も更新）
      } catch (e) {
        document.getElementById("message").textContent = "更新に失敗しました。";
      }
    }

    async function getCurrentNumber() {
  const res = await fetch("/api/number");
  const data = await res.json();
  return data.number;
}

async function startMeasurement() {

  if (timerInterval) {
    alert("すでに計測中です");
    return;
  }

  const currentNumber = await getCurrentNumber();

  if (!currentNumber || currentNumber <= 0) {
    alert("呼び出し番号が0になっています");
    return;
  }

  measuringTicket = currentNumber;

  document.getElementById("current-ticket").textContent =
    `現在計測中: ${measuringTicket}番`;

  timerStartTime = Date.now();

  timerInterval = setInterval(() => {

    const elapsed =
      Math.floor((Date.now() - timerStartTime) / 1000);

    const min =
      Math.floor(elapsed / 60);

    const sec =
      elapsed % 60;

    document.getElementById("elapsed-time").textContent =
      `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;

  }, 1000);

  document.getElementById("message").textContent =
    `${measuringTicket}番の計測を開始しました`;
}

async function finishMeasurement() {

  if (!timerInterval || !measuringTicket) {
    alert("計測されていません");
    return;
  }

  clearInterval(timerInterval);
  timerInterval = null;

  const elapsedMinutes =
    Math.max(
      1,
      Math.round(
        (Date.now() - timerStartTime) / 60000
      )
    );

  try {

    await fetch("/api/time-data", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        number: measuringTicket,
        actualMinutes: elapsedMinutes
      })
    });

    document.getElementById("message").textContent =
      `${measuringTicket}番の所要時間 ${elapsedMinutes}分 を保存しました`;

    document.getElementById("elapsed-time").textContent =
      "00:00";

    document.getElementById("current-ticket").textContent =
      "現在計測中: -";

    measuringTicket = null;
    timerStartTime = null;

    loadTimeData();

  } catch (err) {

    document.getElementById("message").textContent =
      "保存に失敗しました";

  }
}
    loadTimeData();
  </script>

</body>
</html>
