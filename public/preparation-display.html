<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>準備状況</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:sans-serif;
}

#lamp{
  width:250px;
  height:250px;
  border-radius:50%;
  transition:0.3s;
}

.ok{
  background:#00ff55;
  box-shadow:
    0 0 20px #00ff55,
    0 0 50px #00ff55,
    0 0 100px #00ff55;
}

.preparing{
  background:#ff3333;
  box-shadow:
    0 0 20px #ff3333,
    0 0 50px #ff3333,
    0 0 100px #ff3333;
}

#text{
  position:absolute;
  margin-top:350px;
  color:white;
  font-size:3rem;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="lamp"></div>
<div id="text">読込中...</div>
  
<button id="enable-sound">
音声を有効化
</button>
  
<audio id="ready-sound" preload="auto">
  <source src="/alarm.mp3" type="audio/mpeg">
</audio>
  
<script>
let lastPreparingState = null;
  
async function refreshStatus(){

  try{

    const res =
      await fetch("/api/preparation-mode");

    const data =
      await res.json();

    const lamp =
      document.getElementById("lamp");

    const text =
      document.getElementById("text");

if(data.preparing){

  lamp.className = "preparing";
  text.textContent = "";

}else{

  lamp.className = "ok";
  text.textContent = "";

if(
  lastPreparingState === true &&
  soundEnabled
){

  const audio =
    document.getElementById("ready-sound");

  audio.currentTime = 0;

  audio.play()
    .catch(console.error);

}

}

lastPreparingState = data.preparing;

  }catch(err){

    console.error(err);

  }
}

refreshStatus();

setInterval(
  refreshStatus,
  3000
);

let soundEnabled = false;

document
  .getElementById("enable-sound")
  .addEventListener("click", async () => {

    const audio =
      document.getElementById("ready-sound");

    try {

      audio.volume = 0;

      await audio.play();

      audio.pause();

      audio.currentTime = 0;

      audio.volume = 1;

      soundEnabled = true;

      alert("音声を有効化しました");

    } catch(err) {

      console.error(err);

    }

});

</script>

</body>
</html>
